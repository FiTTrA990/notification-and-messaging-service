version: "3.9"

# Docker Compose untuk dependency functional test
# Digunakan oleh Jenkinsfile stage "Functional Tests"
# Jalankan: docker-compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_pass
      POSTGRES_DB: notification_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: notif_user
      RABBITMQ_DEFAULT_PASS: notif_pass
      RABBITMQ_DEFAULT_VHOST: notification_vhost
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
